global:
  resolve_timeout: 1m
  slack_api_url_file: ''   # we use webhook URL inline below

route:
  receiver: 'slack-notify'
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h

receivers:
  - name: 'slack-notify'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alert'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}{{ if eq .GroupLabels.severity "critical" }}🚨{{ else }}🔥{{ end }}{{ else }}✅{{ end }} {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}

inhibit_rules:
  # If the whole service is down, don't also page about latency on it.
  - source_matchers: [alertname = "ServiceDown"]
    target_matchers: [severity = "warning"]
    equal: [service]
